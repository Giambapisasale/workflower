# Blueprint Render — piano FREE (filesystem effimero, nessuna carta richiesta).
# New → Blueprint → punta a questo repo (branch main): crea il servizio "workflower"
# e chiede solo il valore di OPENAI_API_KEY (le altre variabili sono già qui).
#
# EFFIMERO: senza disco persistente, a ogni avvio a freddo l'app si ri-seed da
# capo (utenti demo, schemi, workflow) e gli upload NON sopravvivono allo sleep
# (~15 min di inattività) né a un redeploy. Ottimo per una prova; per conservare
# i dati vedi le note in fondo (serve un piano a pagamento con un disco).
services:
  - type: web
    name: workflower
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt      # se il Free non fosse disponibile qui, togli questa riga (default Oregon)
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATA_DIR
        value: /data/repo
      - key: FRONTEND_DIST
        value: /app/frontend_dist
      - key: JWT_SECRET
        generateValue: true
      # Provider OpenAI, famiglia gpt-5.6 (vision-capable: l'estrazione e la
      # classificazione lavorano sulle immagini delle pagine). T1 = "sol" (SOTA),
      # T2 = "terra" (medio). Cambiali qui se il tuo account usa id diversi.
      - key: LLM_T1_MODEL
        value: openai/gpt-5.6-sol
      - key: LLM_T2_MODEL
        value: openai/gpt-5.6-terra
      - key: OPENAI_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: DIAGNOSTICA_AUTO
        value: "0"

# --- Per renderla PERSISTENTE (i dati sopravvivono a riavvii e redeploy) -----
# Serve un piano a pagamento. Metti `plan: starter` al posto di `plan: free` e
# aggiungi, come figlio del servizio (stessa indentazione di `envVars:`), un disco:
#
#     disk:
#       name: data
#       mountPath: /data
#       sizeGB: 1
#
# DATA_DIR è già /data/repo (sottocartella del disco), quindi non cambia altro.
